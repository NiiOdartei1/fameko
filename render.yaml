services:
  # Main Flask Web Application
  - type: web
    name: fameko-web
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fameko-db
          property: connectionString
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: SOCKETIO_MESSAGE_QUEUE
        fromService:
          type: redis
          name: fameko-redis
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: fameko-redis
          property: connectionString
      - key: ROUTING_SERVICE_URL
        value: http://fameko-routing-go:8080
      - key: ROUTING_SERVICE_PYTHON_URL
        value: http://fameko-routing-python:5001

  # Go Routing Service
  - type: web
    name: fameko-routing-go
    runtime: go
    buildCommand: cd routing && go build -o ../routing_service_go
    startCommand: ./routing_service_go
    envVars:
      - key: PORT
        value: 8080
      - key: REDIS_URL
        fromService:
          type: redis
          name: fameko-redis
          property: connectionString

  # Python Routing Service
  - type: web
    name: fameko-routing-python
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn routing_service:app -w 1 -b 0.0.0.0:5001
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fameko-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: fameko-redis
          property: connectionString

databases:
  - name: fameko-db
    databaseName: fameko
    user: fameko_user

  - type: redis
    name: fameko-redis
    maxmemoryPolicy: allkeys-lru
