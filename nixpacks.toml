[phases.setup]
nixPkgs = ["python3", "python311Packages.pip", "python311Packages.virtualenv"]

[phases.build]
cmds = [
  "python3 -m venv /app/.venv",
  "/app/.venv/bin/pip install --upgrade pip",
  "/app/.venv/bin/pip install -r requirements.txt"
]

[start]
cmd = "/app/.venv/bin/gunicorn app:app -c gunicorn_config.py"
