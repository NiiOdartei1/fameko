<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Error {{ code if code else '' }}</title>
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background:#f8fafc; padding:2rem; font-family: Arial, sans-serif; }</style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="card-body">
          <h1 class="card-title">Error {{ code if code else '' }}</h1>
          <p class="card-text">{{ message if message else 'An unexpected error occurred.' }}</p>
          <a href="{{ url_for('main.index') }}" class="btn btn-primary">Return Home</a>
        </div>
      </div>
    </div>
  </body>
</html>
